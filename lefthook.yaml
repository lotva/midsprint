commit-msg:
  commands:
    'lint commit message':
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{ts,tsx,json,css,yaml,html}'
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    lint-styles:
      glob: '*.{css}'
      run: pnpm exec stylelint --fix {staged_files}
      stage_fixed: true
    lint-scripts:
      glob: '*.{ts,tsx}'
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
